<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwindcss Tutorial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-stone-950 text-stone-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-stone-900 border border-stone-800 p-6 rounded-lg shadow-xl">
        
        <!-- Category & Title -->
        <span class="text-xs font-bold uppercase tracking-widest text-amber-500">Register</span>
        <h2 class="text-2xl font-extrabold mt-1 text-white">Create an Account</h2>
        <p class="text-sm text-stone-400 mt-2">Fill in your details to get started.</p>

        <!-- Registration Form -->
        <div class="mt-6 space-y-4">

            <!-- Full Name -->
            <div>
                <label class="block text-xs font-semibold text-stone-400 uppercase mb-2">Full Name</label>
                <input type="text" placeholder="John Doe" required
                       class="w-full bg-stone-800 border border-stone-700 text-white placeholder-stone-500 rounded px-4 py-2.5 text-sm outline-none transition-all duration-200 focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-semibold text-stone-400 uppercase mb-2">Email</label>
                <input type="email" placeholder="john@example.com" required
                       class="w-full bg-stone-800 border border-stone-700 text-white placeholder-stone-500 rounded px-4 py-2.5 text-sm outline-none transition-all duration-200 focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-xs font-semibold text-stone-400 uppercase mb-2">Phone Number</label>
                <input type="tel" placeholder="+254 700 000 000" required
                       class="w-full bg-stone-800 border border-stone-700 text-white placeholder-stone-500 rounded px-4 py-2.5 text-sm outline-none transition-all duration-200 focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-semibold text-stone-400 uppercase mb-2">Password</label>
                <input type="password" placeholder="••••••••" required
                       class="w-full bg-stone-800 border border-stone-700 text-white placeholder-stone-500 rounded px-4 py-2.5 text-sm outline-none transition-all duration-200 focus:border-amber-500 focus:ring-1 focus:ring-amber-500">
            </div>

            <!-- Submit Button -->
            <button class="w-full font-bold uppercase text-xs tracking-wider py-3 px-4 rounded transition-all duration-200 bg-amber-500 text-stone-950 hover:bg-amber-400 active:bg-amber-600">
                Create Account
            </button>

            <!-- Login Link -->
            <p class="text-center text-sm text-stone-400">Already have an account? 
                <a href="#" class="text-amber-500 hover:text-amber-400">Login</a>
            </p>

        </div>
    </div>
</body>
</html>
